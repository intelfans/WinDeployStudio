<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="WinDeploy Studio release downloads and changelog." />
    <meta name="theme-color" content="#f5f5f7" />
    <title>Downloads - WinDeploy Studio</title>
    <link rel="icon" href="../assets/media/logo.png" />
    <link rel="stylesheet" href="../assets/css/site.css" />
  </head>
  <body data-page="downloads" data-root="../">
    <a class="skip-link" href="#main-content" data-i18n="skip_to_content">跳到主要内容</a>
    <div id="site-header"></div>

    <main id="main-content">
      <section class="page-intro section-canvas" aria-labelledby="downloads-title">
        <div class="content-width narrow-content">
          <p class="eyebrow eyebrow-accent" data-i18n="downloads_eyebrow">应用下载</p>
          <h1 id="downloads-title" data-i18n="downloads_title">最新版与更新记录</h1>
          <p data-i18n="downloads_copy">
            更新说明来自 GitHub Releases；SourceForge 提供可选下载源。下载前会展示文件大小和 SHA-256 摘要。
          </p>
          <p class="download-signing-notice">
            <a href="../code-signing-policy.html" data-i18n="downloads_signing_notice">
              Windows 发布版二进制文件通过 SignPath Foundation 计划进行代码签名。
            </a>
          </p>
        </div>
      </section>

      <section class="section section-surface" aria-labelledby="latest-title">
        <div class="content-width">
          <div class="section-heading compact-heading">
            <p class="eyebrow eyebrow-accent" data-i18n="latest_eyebrow">推荐版本</p>
            <h2 id="latest-title" data-i18n="latest_title">最新稳定版</h2>
          </div>
          <div id="latest-release" class="release-panel" aria-live="polite">
            <div class="release-loading">
              <span class="loading-ring" aria-hidden="true"></span>
              <span data-i18n="release_loading">正在读取发布信息...</span>
            </div>
          </div>
        </div>
      </section>

      <section class="section section-canvas" aria-labelledby="history-title">
        <div class="content-width">
          <div class="section-heading compact-heading">
            <p class="eyebrow eyebrow-accent" data-i18n="history_eyebrow">发行历史</p>
            <h2 id="history-title" data-i18n="history_title">历史版本</h2>
          </div>
          <div id="release-history" class="release-history" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <div id="site-footer"></div>
    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.6/lib/marked.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"></script>
    <script src="../assets/js/site.js"></script>
    <script src="../assets/js/releases.js"></script>
  </body>
</html>
